# general
gen.sample = 抽样
gen.distribution_functions = 分布函数
gen.moments = 矩
gen.discrete = 离散
gen.shape_gt0 = 形状参数 (<font face=\"Consolas\">>0</font>)
gen.num_trials = 试验次数（整数 <font face=\"Consolas\">>0</font>）
gen.location = 位置参数
gen.scale_gt0 = 尺度参数 (<font face=\"Consolas\">>0</font>)
gen.degrees_freedom = 自由度（整数 <font face=\"Consolas\">>0</font>）
gen.pos_real_num = 正实数
gen.real_num_gt0 = 实数 <font face=\"Consolas\">>0</font>
gen.max_value = 最大值
gen.min_value = 最小值
gen.continuous = 连续
gen.multivariate = 多元


# descriptions
desc.sample = 从分布中返回一个随机变量（基准情况下取均值）
desc.pmf = 返回 <font face=\"Consolas\">{0}</font> 处的概率质量函数 (PMF) 值
desc.pdf = 返回 <font face=\"Consolas\">{0}</font> 处的概率密度函数 (PDF) 值
desc.cdf = 返回 <font face=\"Consolas\">{0}</font> 处的累积分布函数 (CDF) 值
desc.quantile = 返回分布在 <font face=\"Consolas\">{0}</font> 处的分位数（逆累积分布函数）
desc.mean = 返回分布的均值
desc.var = 返回分布的方差
desc.prob_success = 成功概率
desc.sample_rounded = 从分布中返回一个随机变量（基准情况下取四舍五入的均值）
desc.sample_median = 从分布中返回一个随机变量（基准情况下取中位数）

# Bern
bern.name = 伯努利分布
bern.desc = 单个布尔值结果的概率分布
bern.support = <font face=\"Consolas\">{0,1}</font> 中的整数

# Beta
beta.name = Beta 分布
beta.desc = 以 <font face=\"Consolas\">0</font> 和 <font face=\"Consolas\">1</font> 为界的连续分布，通常用于对概率建模
beta.support = <font face=\"Consolas\">[0,1]</font> 中的实数

# Bin
bin.name = 二项分布
bin.desc = 用于对固定次数重复试验中成功次数建模
bin.support = <font face=\"Consolas\">{0,1,...,n}</font> 中的整数

# Cat
cat.name = 分类分布
cat.desc = 随机变量可取 <font face=\"Consolas\">n</font> 个可能值之一的离散概率分布
cat.params = 大小为 <font face=\"Consolas\">n</font> 的行向量，包含事件概率（<font face=\"Consolas\">[0,1]</font> 中的实数），总和为 <font face=\"Consolas\">1.0</font>
cat.support = <font face=\"Consolas\">{0,1,...,n-1}</font> 中的整数

# Cauchy
cauchy.name = 柯西分布
cauchy.desc = 具有重尾的钟形分布。<i>注意</i>：均值和方差未定义

# ChiSq
chiSq.name = 卡方分布
chiSq.desc = <font face=\"Consolas\">k</font> 个独立标准正态变量的平方和的分布

# Dir
dir.name = 狄利克雷分布
dir.desc = Beta 分布的多元推广
dir.params = 集中度参数的行向量（实数 <font face=\"Consolas\">>0</font>）
dir.sample = 从狄利克雷分布中返回一个随机向量（基准情况下为均值行向量）
dir.mean = 返回狄利克雷分布均值的行向量
dir.var = 返回狄利克雷分布的协方差矩阵
dir.pdf = 返回狄利克雷 PDF 在 <font face=\"Consolas\"><b>x</b></font> 处的值，其中 <font face=\"Consolas\"><b>x</b></font> 包含 <font face=\"Consolas\">(0,1)</font> 中总和为 <font face=\"Consolas\">1.0</font> 的实数

# DUnif
dunif.name = 离散均匀分布
dunif.desc = 用于对所有值等可能出现的离散分布建模
dunif.min = 最小值，包含（整数）
dunif.max = 最大值，包含（整数）
dunif.support = <font face=\"Consolas\">{a,a+1,...,b}</font> 中的整数

# Expo
expo.name = 指数分布
expo.desc = 用于对具有恒定平均速率的事件间隔时间建模
expo.param = 事件的平均速率（<font face=\"Consolas\">>0</font>）

# Gamma
gamma.name = 伽马分布
gamma.desc = 产生正实数的连续分布

# Geom
geom.name = 几何分布
geom.desc = 用于对首次失败前成功次数建模
geom.support = <font face=\"Consolas\">{0,1,...}</font> 中的整数

# Gumbel
gumbel.name = 耿贝尔分布
gumbel.desc = 用于对各种分布若干样本的极值（最大值/最小值）分布建模

# HalfCauchy
halfCauchy.name = 半柯西分布
halfCauchy.desc = 正半柯西分布。<i>注意</i>：均值和方差未定义

# HalfNorm
halfNorm.name = 半正态分布
halfNorm.desc = 正半正态分布
halfNorm.param = 标准差 <font face=\"Consolas\">>0</font>

# HGeom
hgeom.name = 超几何分布
hgeom.desc = 用于对不放回抽取固定次数中成功次数建模
hgeom.w = 可能成功次数（整数 <font face=\"Consolas\">>0</font>）
hgeom.b = 其他可能结果数量（整数 <font face=\"Consolas\">>0</font>）
hgeom.n = 抽取次数（整数 <font face=\"Consolas\">>0</font>）
hgeom.support = <font face=\"Consolas\">{0,1,...,<i>min</i>(w,n)}</font> 中的整数

# Laplace
laplace.name = 拉普拉斯分布
laplace.desc = 可视为两个指数分布背靠背组合的连续分布

# Logistic
logistic.name = 逻辑斯谛分布
logistic.desc = 形状类似正态分布但具有更重尾部的连续分布

# LogNorm
logNorm.name = 对数正态分布
logNorm.desc = 对数服从正态分布的随机变量的连续分布

# Multi
multi.name = 多项分布
multi.desc = 二项分布在多个类别上的推广
multi.p = 包含事件概率的行向量（<font face=\"Consolas\">[0,1]</font> 中的实数，总和为 <font face=\"Consolas\">1.0</font>）
multi.sample = 从多项分布中返回一个随机向量（基准情况下为均值行向量）
multi.mean = 返回多项分布均值的行向量
multi.var = 返回多项分布的协方差矩阵

# MvNorm
mvNorm.name = 多元正态分布
mvNorm.desc = 多元正态分布
mvNorm.mu = 均值（列向量）
mvNorm.sigma = 协方差矩阵（对称正定）
mvNorm.sample = 从多元正态分布中返回一个随机向量（基准情况下为 <font face=\"Consolas\"><b>\u03BC</b></font>）。实数列向量
mvNorm.pdf = 返回多元正态 PDF 在 <font face=\"Consolas\"><b>X</b></font>（列向量）处的值

# NBin
nbin.name = 负二项分布
nbin.desc = 用于对重复试验中达到指定失败次数之前的成功次数建模
nbin.r = 停止试验前的失败次数（整数 <font face=\"Consolas\">\u22650</font>）

# Norm
norm.name = 正态分布
norm.desc = 经典钟形分布

# Pareto
pareto.name = 帕累托分布
pareto.desc = 幂律概率分布
pareto.scale = 尺度参数（<font face=\"Consolas\">>0</font>）<font face=\"Consolas\">x</font> 的最小可能值
pareto.shape = 形状参数（<font face=\"Consolas\">>0</font>）帕累托指数

# PERT
pert.name = PERT 分布（计划评审技术）
pert.desc = PERT 方法将三角分布转换为 Beta 形状的分布，常用于风险分析中对主观估计建模
pert.min = 最小值，包含
pert.mode = 众数（最可能值）
pert.max = 最大值，不包含
pert.support = <font face=\"Consolas\">[a,c)</font> 中的实数

# Pois
pois.name = 泊松分布
pois.desc = 用于对固定时间/空间区间内以恒定平均速率发生的事件数量建模
pois.lambda = 区间内事件的平均数量（<font face=\"Consolas\">>0</font>）

# StudentT
student.mean_undefined = 当 <font face=\"Consolas\">\u03BD\u22641</font> 时均值未定义
student.var_undefined = 当 <font face=\"Consolas\">\u03BD\u22641</font> 时方差未定义
student.name = 学生 t 分布
student.desc = 以 <font face=\"Consolas\">0</font> 为中心的钟形分布

# Tri
tri.name = 三角分布
tri.desc = 用于对随机变量的最小值、最可能值和最大值建模的简单分布

# TruncNorm
truncNorm.name = 截断正态分布
truncNorm.desc = 由最小/最大值限定的正态分布
truncNorm.support = <font face=\"Consolas\">[a,b]</font> 中的实数

# Unif
unif.name = 均匀分布
unif.desc = 用于对所有值等可能出现的连续分布建模
unif.support = <font face=\"Consolas\">[a,b)</font> 中的实数

# Weibull
weibull.name = 威布尔分布
weibull.desc = 常用于对失效时间建模

# Zipf
zipf.name = 齐普夫分布
zipf.desc = 用于对离散幂律分布建模
zipf.s = 指数（实数 <font face=\"Consolas\">>0</font>）
zipf.n = 元素数量（整数 <font face=\"Consolas\">\u22651</font>）
zipf.support = <font face=\"Consolas\">{1,2,...,n}</font> 中的整数