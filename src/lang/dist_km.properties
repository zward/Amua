# general
gen.sample = бһӮбҹҶбһҡбһј
gen.distribution_functions = бһўбһ“бһ»бһӮбһҳбһ“бҹҚбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ
gen.moments = бһҳбҹүбһјбһҳбҹүбһ„бҹӢ
gen.discrete = бһҠбһ¶бһ…бҹӢбһҠбҹ„бһҷбһЎбҹӮбһҖ
gen.shape_gt0 = бһҡбһ¶бһ„ (<font face="Consolas">>0</font>)
gen.num_trials = бһ…бҹҶбһ“бһҪбһ“бһҖбһ¶бһҡбһҹбһ¶бһҖбһӣбҹ’бһ”бһ„ (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ <font face="Consolas">>0</font>)
gen.location = бһ‘бһёбһҸбһ¶бҹҶбһ„
gen.scale_gt0 = бһҳбһ¶бһҸбҹ’бһҡбһҠбҹ’бһӢбһ¶бһ“ (<font face="Consolas">>0</font>)
gen.degrees_freedom = бһҠбһәбһҖбҹ’бһҡбҹҒбһ“бһ·бһҷбһ¶бһҷбһҹбҹ’бһҡбһёбһ—бһ¶бһ– (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ <font face="Consolas">>0</font>)
gen.pos_real_num = бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһңбһҮбҹ’бһҮбһҳбһ¶бһ“
gen.real_num_gt0 = бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸ <font face="Consolas">>0</font>
gen.max_value = бһҸбһҳбҹ’бһӣбҹғбһўбһҸбһ·бһ”бһҡбһҳбһ¶
gen.min_value = бһҸбһҳбҹ’бһӣбҹғбһўбһ”бҹ’бһ”бһ”бһҡбһҳбһ¶
gen.continuous = бһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢ
gen.multivariate = бһ–бһ бһ»бһўбһҗбҹҒбһҡ


# descriptions
desc.sample = бһҸбҹ’бһҡбһЎбһ”бҹӢбһўбһҗбҹҒбһҡбһ…бҹғбһҠбһ“бҹ’бһҷ (бһҳбһ’бҹ’бһҷбһҳбһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“) бһ–бһёбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ
desc.pmf = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҸбһҳбҹ’бһӣбҹғ PMF бһ“бҹ… <font face="Consolas">{0}</font>
desc.pdf = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҸбһҳбҹ’бһӣбҹғ PDF бһ“бҹ… <font face="Consolas">{0}</font>
desc.cdf = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҸбһҳбҹ’бһӣбҹғ CDF бһ“бҹ… <font face="Consolas">{0}</font>
desc.quantile = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҖбҹ’бһңбһ¶бһ“бҹӢбһ‘бһёбһӣ (CDF бһ”бһүбҹ’бһ…бҹ’бһҡбһ¶бһҹ) бһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ“бҹ… <font face="Consolas">{0}</font>
desc.mean = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҳбһ’бҹ’бһҷбһҳбһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ
desc.var = бһҸбҹ’бһҡбһЎбһ”бҹӢбһңбҹүбһ¶бһҡбҹүбҹ’бһҷбһ„бҹӢбһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ
desc.prob_success = бһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһ“бҹғбһҮбҹ„бһӮбһҮбҹҗбһҷ
desc.sample_rounded = бһҸбҹ’бһҡбһЎбһ”бҹӢбһўбһҗбҹҒбһҡбһ…бҹғбһҠбһ“бҹ’бһҷ (бһҳбһ’бҹ’бһҷбһҳбһ”бһ„бҹ’бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“) бһ–бһёбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ
desc.sample_median = бһҸбҹ’бһҡбһЎбһ”бҹӢбһўбһҗбҹҒбһҡбһ…бҹғбһҠбһ“бҹ’бһҷ (бһҳбҹҒбһҠбҹ’бһҷбһ¶бһ“бһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“) бһ–бһёбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ

# Bern
bern.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹҠбһәбһҺбһјбһӣбһё
bern.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһ“бҹғбһӣбһ‘бҹ’бһ’бһ•бһӣбһҸбһҳбҹ’бһӣбҹғбһ”бҹҠбһјбһӣбһҸбҹӮбһҳбһҪбһҷ
bern.support = бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">{0,1}</font>

# Beta
beta.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹҒбһҸбһ¶
beta.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһҳбһ¶бһ“бһ–бҹ’бһҡбҹҶбһҠбҹӮбһ“бһҠбҹ„бһҷ <font face="Consolas">0</font> бһ“бһ·бһ„ <font face="Consolas">1</font>бҹ” бһ…бҹ’бһҡбһҫбһ“бһҸбҹӮбһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ”бҹ’бһҡбһјбһ”бһ¶бһ”
beta.support = бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">[0,1]</font>

# Bin
bin.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһёбһҺбһјбһҳбҹҖбһӣ
bin.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ…бҹҶбһ“бһҪбһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһҠбҹӮбһӣбһҖбһҫбһҸбһЎбһҫбһ„бһҖбҹ’бһ“бһ»бһ„бһ…бҹҶбһ“бһҪбһ“бһҖбһ¶бһҡбһҹбһ¶бһҖбһӣбҹ’бһ”бһ„бһҗбҹҒбһҡ
bin.support = бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">{0,1,...,n}</font>

# Cat
cat.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹ’бһҡбһ—бҹҒбһ‘
cat.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһҠбһ¶бһ…бҹӢбһҠбҹ„бһҷбһЎбҹӮбһҖбһ“бҹғбһўбһҗбҹҒбһҡбһ…бҹғбһҠбһ“бҹ’бһҷбһҠбҹӮбһӣбһўбһ¶бһ…бһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғ <font face="Consolas">n</font> бһҠбҹӮбһӣбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһ”бһ¶бһ“
cat.params = бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҠбҹҒбһҖбһ‘бҹҶбһ бҹҶ <font face="Consolas">n</font> бһҳбһ¶бһ“бһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҺбҹҚ (бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">[0,1]</font>) бһҠбҹӮбһӣбһҹбһҡбһ»бһ”бһҮбһ¶ <font face="Consolas">1.0</font>
cat.support = бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">{0,1,...,n-1}</font>

# Cauchy
cauchy.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҖбһјбһҲбһё
cauchy.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҡбһ¶бһ„бһҖбһҺбҹ’бһҸбһ№бһ„бһҠбҹӮбһӣбһҳбһ¶бһ“бһҖбһ“бҹ’бһ‘бһ»бһҷбһ’бҹ’бһ„бһ“бҹӢбҹ” <i>бһҖбҹҶбһҺбһҸбҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢ</i>: бһҳбһ’бҹ’бһҷбһҳ бһ“бһ·бһ„бһңбҹүбһ¶бһҡбҹүбҹ’бһҷбһ„бҹӢбһҳбһ·бһ“бһҖбҹҶбһҺбһҸбҹӢ

# ChiSq
chiSq.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҲбһёбһҖбһ¶бһҡбҹүбҹҒ
chiSq.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ“бҹғбһ•бһӣбһ”бһјбһҖбһҖбһ¶бһҡбҹүбҹҒбһ“бҹғбһўбһҗбҹҒбһҡбһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ’бһҳбҹ’бһҳбһҸбһ¶бһҜбһҖбһҡбһ¶бһҮбҹ’бһҷ <font face="Consolas">k</font>

# Dir
dir.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҢбһёбһҡбһёбһҲбҹ’бһӣбҹҒ
dir.desc = бһҖбһ¶бһҡбһ”бһ“бҹ’бһӣбһ¶бһҷбһ–бһ бһ»бһўбһҗбҹҒбһҡбһ‘бһјбһ‘бҹ…бһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹҒбһҸбһ¶
dir.params = бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҠбҹҒбһҖбһ“бҹғбһ”бҹүбһ¶бһҡбҹүбһ¶бһҳбҹүбҹӮбһҸбҹ’бһҡбһҖбҹҶбһ бһ¶бһ”бҹӢ (бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸ <font face="Consolas">>0</font>)
dir.sample = бһҸбҹ’бһҡбһЎбһ”бҹӢбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ…бҹғбһҠбһ“бҹ’бһҷ (бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҠбҹҒбһҖбһ“бҹғбһҳбһ’бҹ’бһҷбһҳбһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“) бһ–бһёбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҢбһёбһҡбһёбһҲбҹ’бһӣбҹҒ
dir.mean = бһҸбҹ’бһҡбһЎбһ”бҹӢбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҠбҹҒбһҖбһ“бҹғбһҳбһ’бҹ’бһҷбһҳбһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҢбһёбһҡбһёбһҲбҹ’бһӣбҹҒ
dir.var = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҳбҹүбһ¶бһ‘бҹ’бһҡбһёбһҹбһҖбһјбһңбҹүбһ¶бһҡбҹүбҹ’бһҷбһ„бҹӢбһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҢбһёбһҡбһёбһҲбҹ’бһӣбҹҒ
dir.pdf = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҸбһҳбҹ’бһӣбҹғ PDF бһҢбһёбһҡбһёбһҲбҹ’бһӣбҹҒбһ“бҹ… <font face="Consolas"><b>x</b></font> бһҠбҹӮбһӣ <font face="Consolas"><b>x</b></font> бһҳбһ¶бһ“бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">(0,1)</font> бһҠбҹӮбһӣбһҹбһҡбһ»бһ”бһҮбһ¶ <font face="Consolas">1.0</font>

# DUnif
dunif.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҜбһҖбһҹбһҺбҹ’бһӢбһ¶бһ“бһҠбһ¶бһ…бҹӢбһҠбҹ„бһҷбһЎбҹӮбһҖ
dunif.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҠбһ¶бһ…бҹӢбһҠбҹ„бһҷбһЎбҹӮбһҖбһҠбҹӮбһӣбһҸбһҳбҹ’бһӣбҹғбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҳбһ¶бһ“бһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһҹбҹ’бһҳбһҫбһӮбҹ’бһ“бһ¶
dunif.min = бһҸбһҳбҹ’бһӣбҹғбһўбһ”бҹ’бһ”бһ”бһҡбһҳбһ¶, бһҡбһҪбһҳбһ”бһүбҹ’бһ…бһјбһӣ (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ)
dunif.max = бһҸбһҳбҹ’бһӣбҹғбһўбһҸбһ·бһ”бһҡбһҳбһ¶, бһҡбһҪбһҳбһ”бһүбҹ’бһ…бһјбһӣ (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ)
dunif.support = бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">{a,a+1,...,b}</font>

# Expo
expo.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһўбһ·бһ…бһҹбҹүбҹ’бһ”бһјбһҺбһ„бҹӢбһҹбҹ’бһҷбҹӮбһӣ
expo.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶бһҡбһңбһ¶бһ„бһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҺбҹҚбһҠбҹӮбһӣбһҳбһ¶бһ“бһўбһҸбҹ’бһҡбһ¶бһҳбһ’бҹ’бһҷбһҳбһҗбҹҒбһҡ
expo.param = бһўбһҸбҹ’бһҡбһ¶бһҳбһ’бҹ’бһҷбһҳбһ“бҹғбһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҺбҹҚ (<font face="Consolas">>0</font>)

# Gamma
gamma.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ бҹ’бһӮбһ¶бҹҶбһҳбҹүбһ¶
gamma.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһ•бҹ’бһҸбһӣбҹӢбһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһңбһҮбҹ’бһҮбһҳбһ¶бһ“

# Geom
geom.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҡбһҺбһёбһҳбһ¶бһҸбҹ’бһҡ
geom.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ…бҹҶбһ“бһҪбһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһҠбҹӮбһӣбһҖбһҫбһҸбһЎбһҫбһ„бһҳбһ»бһ“бһҖбһ¶бһҡбһ”бһҡбһ¶бһҮбҹҗбһҷбһҠбҹҶбһ”бһјбһ„
geom.support = бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">{0,1,...}</font>

# Gumbel
gumbel.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ бҹ’бһӮбһ¶бҹҶбһ”бҹӮбһӣ
gumbel.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ“бҹғбһҸбһҳбҹ’бһӣбҹғбһҒбҹ’бһӣбһ¶бҹҶбһ„ (бһўбһҸбһ·бһ”бһҡбһҳбһ¶/бһўбһ”бҹ’бһ”бһ”бһҡбһҳбһ¶) бһ“бҹғбһӮбҹҶбһҡбһјбһҮбһ¶бһ…бҹ’бһҡбһҫбһ“бһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ•бҹ’бһҹбҹҒбһ„бҹ—

# HalfCauchy
halfCauchy.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҖбһ“бҹ’бһӣбҹҮбһҖбһјбһҲбһё
halfCauchy.desc = бһҖбһ“бҹ’бһӣбҹҮбһҖбһјбһҲбһёбһңбһҮбҹ’бһҮбһҳбһ¶бһ“бҹ” <i>бһҖбҹҶбһҺбһҸбҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢ</i>: бһҳбһ’бҹ’бһҷбһҳ бһ“бһ·бһ„бһңбҹүбһ¶бһҡбҹүбҹ’бһҷбһ„бҹӢбһҳбһ·бһ“бһҖбҹҶбһҺбһҸбҹӢ

# HalfNorm
halfNorm.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҖбһ“бҹ’бһӣбҹҮбһ’бһҳбҹ’бһҳбһҸбһ¶
halfNorm.desc = бһҖбһ“бҹ’бһӣбҹҮбһ’бһҳбҹ’бһҳбһҸбһ¶бһңбһҮбҹ’бһҮбһҳбһ¶бһ“
halfNorm.param = бһӮбһҳбҹ’бһӣбһ¶бһҸбһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡ <font face="Consolas">>0</font>

# HGeom
hgeom.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһўбҹҠбһёбһ–бҹӮбһ бҹ’бһҹбҹҒбһўбһјбһҳбҹүбҹҒбһ‘бҹ’бһҡбһёбһҖ
hgeom.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ…бҹҶбһ“бһҪбһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһҖбҹ’бһ“бһ»бһ„бһ…бҹҶбһ“бһҪбһ“бһ‘бһ¶бһүбһҗбҹҒбһҡбһҠбҹ„бһҷбһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһҮбҹҶбһ“бһҪбһҹ
hgeom.w = бһ…бҹҶбһ“бһҪбһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһҠбҹӮбһӣбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһ”бһ¶бһ“ (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ <font face="Consolas">>0</font>)
hgeom.b = бһ…бҹҶбһ“бһҪбһ“бһӣбһ‘бҹ’бһ’бһ•бһӣбһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸбһҠбҹӮбһӣбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһ”бһ¶бһ“ (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ <font face="Consolas">>0</font>)
hgeom.n = бһ…бҹҶбһ“бһҪбһ“бһҖбһ¶бһҡбһ‘бһ¶бһү (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ <font face="Consolas">>0</font>)
hgeom.support = бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">{0,1,...,<i>min</i>(w,n)}</font>

# Laplace
laplace.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһЎбһ¶бһ”бҹ’бһӣбһ¶бһҹ
laplace.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһўбһ¶бһ…бһӮбһ·бһҸбһҗбһ¶бһҮбһ¶бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһўбһ·бһ…бһҹбҹүбҹ’бһ”бһјбһҺбһ„бҹӢбһҹбҹ’бһҷбҹӮбһӣбһ–бһёбһҡбһҠбһ¶бһҖбҹӢбһҒбҹ’бһ“бһ„бһ‘бҹ…бһҒбҹ’бһ“бһ„

# Logistics
logistic.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһЎбһјбһҮбһёбһҹбҹ’бһ‘бһёбһҖ
logistic.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһҹбҹ’бһҡбһҠбҹҖбһ„бһ“бһ№бһ„бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶бһҖбҹ’бһ“бһ»бһ„бһҡбһ¶бһ„бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҳбһ¶бһ“бһҖбһ“бҹ’бһ‘бһ»бһҷбһ’бҹ’бһ„бһ“бҹӢбһҮбһ¶бһ„

# LogNorm
logNorm.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһЎбһјбһҖбһ¶бһҡбһёбһҸбһ’бһҳбҹ’бһҳбһҸбһ¶
logNorm.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ“бҹғбһўбһҗбҹҒбһҡбһ…бҹғбһҠбһ“бҹ’бһҷбһҠбҹӮбһӣбһЎбһјбһҖбһ¶бһҡбһёбһҸбһ’бҹ’бһңбһҫбһҸбһ¶бһҳбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶

# Multi
multi.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ–бһ бһ»бһҺбһјбһҳбҹҖбһӣ
multi.desc = бһҖбһ¶бһҡбһ”бһ“бҹ’бһӣбһ¶бһҷбһ‘бһјбһ‘бҹ…бһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһёбһҺбһјбһҳбҹҖбһӣбһ‘бҹ…бһ”бҹ’бһҡбһ—бҹҒбһ‘бһ…бҹ’бһҡбһҫбһ“
multi.p = бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҠбҹҒбһҖбһҳбһ¶бһ“бһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҺбҹҚ (бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">[0,1]</font> бһҠбҹӮбһӣбһҹбһҡбһ»бһ”бһҮбһ¶ <font face="Consolas">1.0</font>)
multi.sample = бһҸбҹ’бһҡбһЎбһ”бҹӢбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ…бҹғбһҠбһ“бҹ’бһҷ (бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҠбҹҒбһҖбһ“бҹғбһҳбһ’бҹ’бһҷбһҳбһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“) бһ–бһёбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ–бһ бһ»бһҺбһјбһҳбҹҖбһӣ
multi.mean = бһҸбҹ’бһҡбһЎбһ”бҹӢбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҠбҹҒбһҖбһ“бҹғбһҳбһ’бҹ’бһҷбһҳбһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ–бһ бһ»бһҺбһјбһҳбҹҖбһӣ
multi.var = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҳбҹүбһ¶бһ‘бҹ’бһҡбһёбһҹбһҖбһјбһңбҹүбһ¶бһҡбҹүбҹ’бһҷбһ„бҹӢбһ“бҹғбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ–бһ бһ»бһҺбһјбһҳбҹҖбһӣ

# MvNorm
mvNorm.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶бһ–бһ бһ»бһўбһҗбҹҒбһҡ
mvNorm.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶бһ–бһ бһ»бһўбһҗбҹҒбһҡ
mvNorm.mu = бһҳбһ’бҹ’бһҷбһҳ (бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҲбһҡ)
mvNorm.sigma = бһҳбҹүбһ¶бһ‘бҹ’бһҡбһёбһҹбһҖбһјбһңбҹүбһ¶бһҡбҹүбҹ’бһҷбһ„бҹӢ (бһҹбҹҠбһёбһҳбҹҒбһ‘бҹ’бһҡбһёбһҖбһңбһҮбҹ’бһҮбһҳбһ¶бһ“бһҖбҹҶбһҺбһҸбҹӢ)
mvNorm.sample = бһҸбҹ’бһҡбһЎбһ”бҹӢбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһ…бҹғбһҠбһ“бҹ’бһҷ (<font face="Consolas"><b>\u03BC</b></font> бһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“) бһ–бһёбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶бһ–бһ бһ»бһўбһҗбҹҒбһҡбҹ” бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҲбһҡбһ“бҹғбһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸ
mvNorm.pdf = бһҸбҹ’бһҡбһЎбһ”бҹӢбһҸбһҳбҹ’бһӣбҹғ PDF бһ’бһҳбҹ’бһҳбһҸбһ¶бһ–бһ бһ»бһўбһҗбҹҒбһҡбһ“бҹ… <font face="Consolas"><b>X</b></font> (бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҮбһҪбһҡбһҲбһҡ)

# NBin
nbin.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһёбһҺбһјбһҳбҹҖбһӣбһўбһңбһ·бһҮбҹ’бһҮбһҳбһ¶бһ“
nbin.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ…бҹҶбһ“бһҪбһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһҠбҹӮбһӣбһҖбһҫбһҸбһЎбһҫбһ„бһҖбҹ’бһ“бһ»бһ„бһ…бҹҶбһҺбҹ„бһҳбһҖбһ¶бһҡбһҹбһ¶бһҖбһӣбҹ’бһ”бһ„бһҳбҹ’бһҸбһ„бһ бһҫбһҷбһҳбҹ’бһҸбһ„бһ‘бҹҖбһҸбһҳбһ»бһ“бһ–бҹҒбһӣбһ…бҹҶбһ“бһҪбһ“бһҖбһ¶бһҡбһ”бһҡбһ¶бһҮбҹҗбһҷбһҠбҹӮбһӣбһ”бһ¶бһ“бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҖбһҫбһҸбһЎбһҫбһ„
nbin.r = бһ…бҹҶбһ“бһҪбһ“бһҖбһ¶бһҡбһ”бһҡбһ¶бһҮбҹҗбһҷбһҡбһ бһјбһҸбһҠбһӣбҹӢбһҖбһ¶бһҡбһҹбһ¶бһҖбһӣбҹ’бһ”бһ„бһҸбҹ’бһҡбһјбһңбһ”бһүбҹ’бһҲбһ”бҹӢ (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ <font face="Consolas">\u22650</font>)

# Norm
norm.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶
norm.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҡбһ¶бһ„бһҖбһҺбҹ’бһҸбһ№бһ„бһӮбҹҶбһҡбһј

# Pareto
pareto.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹүбһ¶бһҡбҹүбҹҒбһҸбһј
pareto.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһ…бҹ’бһ”бһ¶бһ”бҹӢбһҹбҹҗбһҖбҹ’бһҸбһ·
pareto.scale = бһҳбһ¶бһҸбҹ’бһҡбһҠбҹ’бһӢбһ¶бһ“ (<font face="Consolas">>0</font>) бһҸбһҳбҹ’бһӣбҹғбһўбһ”бҹ’бһ”бһ”бһҡбһҳбһ¶бһҠбҹӮбһӣбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһ”бһ¶бһ“бһ“бҹғ <font face="Consolas">x</font>
pareto.shape = бһҡбһ¶бһ„ (<font face="Consolas">>0</font>) бһӣбһ·бһ”бһ·бһҖбҹ’бһҡбһҳбһ”бҹүбһ¶бһҡбҹүбҹҒбһҸбһј

# PERT
pert.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ PERT (бһ”бһ…бҹ’бһ…бҹҒбһҖбһ‘бҹҒбһҹбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғ бһ“бһ·бһ„бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһё)
pert.desc = бһңбһ·бһ’бһёбһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡ PERT бһ”бҹҶбһ”бҹ’бһӣбҹӮбһ„бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҸбҹ’бһҡбһёбһҖбҹ„бһҺбһ‘бҹ…бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҡбһ¶бһ„бһ”бҹҒбһҸбһ¶бҹ” бһңбһ¶бһ…бҹ’бһҡбһҫбһ“бһҸбҹӮбһ”бҹ’бһҡбһҫбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһңбһ·бһ—бһ¶бһӮбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҠбһҫбһҳбҹ’бһ”бһёбһҳбҹүбһјбһҠбҹӮбһӣбһҖбһ¶бһҡбһ”бҹүбһ¶бһ“бҹӢбһҹбҹ’бһҳбһ¶бһ“бһ”бҹ’бһҡбһ’бһ¶бһ“бһ”бһ‘
pert.min = бһҸбһҳбҹ’бһӣбҹғбһўбһ”бҹ’бһ”бһ”бһҡбһҳбһ¶, бһҡбһҪбһҳбһ”бһүбҹ’бһ…бһјбһӣ
pert.mode = бһҡбһ”бҹҖбһ” (бһҸбһҳбҹ’бһӣбҹғбһ‘бҹҶбһ“бһ„бһҮбһ¶бһ„бһӮбҹҒбһ”бҹҶбһ•бһ»бһҸ)
pert.max = бһҸбһҳбҹ’бһӣбҹғбһўбһҸбһ·бһ”бһҡбһҳбһ¶, бһҳбһ·бһ“бһҡбһҪбһҳбһ”бһүбҹ’бһ…бһјбһӣ
pert.support = бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">[a,c)</font>

# Pois
pois.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бҹүбһјбһўбһ¶бһҹбһ»бһ„
pois.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ…бҹҶбһ“бһҪбһ“бһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҺбҹҚбһҠбҹӮбһӣбһҖбһҫбһҸбһЎбһҫбһ„бһҖбҹ’бһ“бһ»бһ„бһ…бһ“бҹ’бһӣбҹ„бҹҮбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶/бһ‘бһёбһҖбһ“бҹ’бһӣбҹӮбһ„бһҗбҹҒбһҡбһҠбҹӮбһӣбһҳбһ¶бһ“бһўбһҸбҹ’бһҡбһ¶бһҳбһ’бҹ’бһҷбһҳбһҗбҹҒбһҡ
pois.lambda = бһ…бҹҶбһ“бһҪбһ“бһҳбһ’бҹ’бһҷбһҳбһ“бҹғбһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҺбҹҚбһҖбҹ’бһ“бһ»бһ„бһ…бһ“бҹ’бһӣбҹ„бҹҮ (<font face="Consolas">>0</font>)

# StudentT
student.mean_undefined = бһҳбһ’бҹ’бһҷбһҳбһҳбһ·бһ“бһҖбҹҶбһҺбһҸбҹӢбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ <font face="Consolas">\u03BD\u22641</font>
student.var_undefined = бһңбҹүбһ¶бһҡбҹүбҹ’бһҷбһ„бҹӢбһҳбһ·бһ“бһҖбҹҶбһҺбһҸбҹӢбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ <font face="Consolas">\u03BD\u22641</font>
student.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ t бһҡбһ”бһҹбҹӢбһҹбһ·бһҹбҹ’бһҹ
student.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҡбһ¶бһ„бһҖбһҺбҹ’бһҸбһ№бһ„бһҖбһҺбҹ’бһҸбһ¶бһӣбһ“бҹ… <font face="Consolas">0</font>

# Tri
tri.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҸбҹ’бһҡбһёбһҖбҹ„бһҺ
tri.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҹбһ¶бһҳбһүбҹ’бһүбһҠбһҫбһҳбҹ’бһ”бһёбһҳбҹүбһјбһҠбҹӮбһӣбһҸбһҳбҹ’бһӣбҹғбһўбһ”бҹ’бһ”бһ”бһҡбһҳбһ¶, бһ‘бҹҶбһ“бһ„бһҮбһ¶бһ„бһӮбҹҒбһ”бҹҶбһ•бһ»бһҸ, бһ“бһ·бһ„бһўбһҸбһ·бһ”бһҡбһҳбһ¶бһ“бҹғбһўбһҗбҹҒбһҡбһ…бҹғбһҠбһ“бҹ’бһҷ

# TruncNorm
truncNorm.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶бһҖбһ¶бһҸбҹӢ
truncNorm.desc = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ’бһҳбҹ’бһҳбһҸбһ¶бһҠбҹӮбһӣбһҳбһ¶бһ“бһ–бҹ’бһҡбҹҶбһҠбҹӮбһ“бһҠбҹ„бһҷбһҸбһҳбҹ’бһӣбҹғбһўбһ”бҹ’бһ”бһ”бһҡбһҳбһ¶/бһўбһҸбһ·бһ”бһҡбһҳбһ¶
truncNorm.support = бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">[a,b]</font>

# Unif
unif.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһҜбһҖбһҹбһҺбҹ’бһӢбһ¶бһ“
unif.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһҸбһҳбҹ’бһӣбҹғбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҳбһ¶бһ“бһ”бҹ’бһҡбһјбһ”бһ¶бһ”бһҹбҹ’бһҳбһҫбһӮбҹ’бһ“бһ¶
unif.support = бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">[a,b)</font>

# Weibull
weibull.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһңбҹҒбһ”бһјбһӣ
weibull.desc = бһ…бҹ’бһҡбһҫбһ“бһҸбҹӮбһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶бһҡбһ бһјбһҸбһҠбһӣбҹӢбһҖбһ¶бһҡбһ”бһҡбһ¶бһҮбҹҗбһҷ

# Zipf
zipf.name = бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ бҹ’бһҹбһёбһ”
zipf.desc = бһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҳбҹүбһјбһҠбҹӮбһӣбһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷбһ…бҹ’бһ”бһ¶бһ”бҹӢбһҹбҹҗбһҖбҹ’бһҸбһ·бһҠбһ¶бһ…бҹӢбһҠбҹ„бһҷбһЎбҹӮбһҖ
zipf.s = бһўбһ·бһ…бһҹбҹүбҹ’бһ”бһјбһҺбһ„бҹӢ (бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸ <font face="Consolas">>0</font>)
zipf.n = бһ…бҹҶбһ“бһҪбһ“бһ’бһ¶бһҸбһ» (бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢ <font face="Consolas">\u22651</font>)
zipf.support = бһ…бҹҶбһ“бһҪбһ“бһӮбһҸбҹӢбһҖбҹ’бһ“бһ»бһ„ <font face="Consolas">{1,2,...,n}</font>