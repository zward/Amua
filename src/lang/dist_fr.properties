# descriptions
desc.sample = Retourne une variable aléatoire (moyenne dans le cas de base) de la distribution
desc.pmf = Retourne la valeur de la FMP à <font face=\"Consolas\">{0}</font>
desc.pdf = Retourne la valeur de la FDP à <font face=\"Consolas\">{0}</font>
desc.cdf = Retourne la valeur de la FDC à <font face=\"Consolas\">{0}</font>
desc.quantile = Retourne le quantile (FDC inverse) de la distribution à <font face=\"Consolas\">{0}</font>
desc.mean = Retourne la moyenne de la distribution
desc.var = Retourne la variance de la distribution
desc.prob_success = Probabilité de succès
desc.sample_rounded = Retourne une variable aléatoire (moyenne arrondie dans le cas de base) de la distribution
desc.sample_median = Retourne une variable aléatoire (médiane dans le cas de base) de la distribution

# Bern
bern.name = Distribution de Bernoulli
bern.desc = La distribution de probabilité d'un seul résultat à valeur booléenne
bern.support = Entier dans <font face=\"Consolas\">{0,1}</font>

# Beta
beta.name = Distribution bêta
beta.desc = Une distribution continue bornée par <font face=\"Consolas\">0</font> et <font face=\"Consolas\">1</font>. Souvent utilisée pour modéliser les probabilités
beta.support = Nombre réel dans <font face=\"Consolas\">[0,1]</font>

# Bin
bin.name = Distribution binomiale
bin.desc = Utilisée pour modéliser le nombre de succès qui se produisent dans un nombre fixe d'essais répétés
bin.support = Entier dans <font face=\"Consolas\">{0,1,...,n}</font>

# Cat
cat.name = Distribution catégorielle
cat.desc = Une distribution de probabilité discrète d'une variable aléatoire qui peut prendre une des <font face=\"Consolas\">n</font> valeurs possibles
cat.params = Vecteur ligne de taille <font face=\"Consolas\">n</font> contenant les probabilités d'événements (nombres réels dans <font face=\"Consolas\">[0,1]</font>) qui somment à <font face=\"Consolas\">1,0</font>
cat.support = Entier dans <font face=\"Consolas\">{0,1,...,n-1}</font>

# Cauchy
cauchy.name = Distribution de Cauchy
cauchy.desc = Une distribution en forme de cloche avec des queues lourdes. <i>Note</i> : La moyenne et la variance sont indéfinies

# ChiSq
chiSq.name = Distribution du chi-carré
chiSq.desc = Distribution de la somme des carrés de <font face=\"Consolas\">k</font> variables normales standard indépendantes

# Dir
dir.name = Distribution de Dirichlet
dir.desc = Une généralisation multivariée de la distribution bêta
dir.params = Vecteur ligne de paramètres de concentration (Nombres réels <font face=\"Consolas\">>0</font>)
dir.sample = Retourne un vecteur aléatoire (vecteur ligne de moyennes dans le cas de base) de la distribution de Dirichlet
dir.mean = Retourne un vecteur ligne de moyennes de la distribution de Dirichlet
dir.var = Retourne la matrice de covariance de la distribution de Dirichlet
dir.pdf = Retourne la valeur de la FDP de Dirichlet à <font face=\"Consolas\"><b>x</b></font> où <font face=\"Consolas\"><b>x</b></font> contient des nombres réels dans <font face=\"Consolas\">(0,1)</font> qui somment à <font face=\"Consolas\">1,0</font>

# DUnif
dunif.name = Distribution uniforme discrète
dunif.desc = Utilisée pour modéliser une distribution discrète où toutes les valeurs sont équiprobables
dunif.min = Valeur minimale, inclusive (entier)
dunif.max = Valeur maximale, inclusive (entier)
dunif.support = Entier dans <font face=\"Consolas\">{a,a+1,...,b}</font>

# Expo
expo.name = Distribution exponentielle
expo.desc = Utilisée pour modéliser le temps entre les événements avec un taux moyen constant
expo.param = Taux moyen d'événements (<font face=\"Consolas\">>0</font>)

# Gamma
gamma.name = Distribution gamma
gamma.desc = Une distribution continue qui produit des nombres réels positifs

# Geom
geom.name = Distribution géométrique
geom.desc = Utilisée pour modéliser le nombre de succès qui se produisent avant le premier échec
geom.support = Entier dans <font face=\"Consolas\">{0,1,...}</font>

# Gumbel
gumbel.name = Distribution de Gumbel
gumbel.desc = Utilisée pour modéliser la distribution des extrema (max/min) d'un nombre d'échantillons de diverses distributions

# HalfCauchy
halfCauchy.name = Distribution demi-Cauchy
halfCauchy.desc = Demi-Cauchy positive. <i>Note</i> : La moyenne et la variance sont indéfinies

# HalfNorm
halfNorm.name = Distribution demi-normale
halfNorm.desc = Demi-normale positive
halfNorm.param = Écart-type <font face=\"Consolas\">>0</font>

# HGeom
hgeom.name = Distribution hypergéométrique
hgeom.desc = Utilisée pour modéliser le nombre de succès dans un nombre fixe de tirages sans remise
hgeom.w = Nombre de succès possibles (Entier <font face=\"Consolas\">>0</font>)
hgeom.b = Nombre d'autres résultats possibles (Entier <font face=\"Consolas\">>0</font>)
hgeom.n = Nombre de tirages (Entier <font face=\"Consolas\">>0</font>)
hgeom.support = Entier dans <font face=\"Consolas\">{0,1,...,<i>min</i>(w,n)}</font>

# Laplace
laplace.name = Distribution de Laplace
laplace.desc = Une distribution continue qui peut être considérée comme deux distributions exponentielles mises dos à dos

# Logistics
logistic.name = Distribution logistique
logistic.desc = Une distribution continue qui ressemble à la distribution normale en forme mais a des queues plus lourdes

# LogNorm
logNorm.name = Distribution log-normale
logNorm.desc = Une distribution continue d'une variable aléatoire dont le logarithme suit une distribution normale

# Multi
multi.name = Distribution multinomiale
multi.desc = Une généralisation de la distribution binomiale à plusieurs catégories
multi.p = Vecteur ligne contenant les probabilités d'événements (Nombres réels dans <font face=\"Consolas\">[0,1]</font> qui somment à <font face=\"Consolas\">1,0</font>)
multi.sample = Retourne un vecteur aléatoire (vecteur ligne de moyennes dans le cas de base) de la distribution multinomiale
multi.mean = Retourne un vecteur ligne de moyennes de la distribution multinomiale
multi.var = Retourne la matrice de covariance de la distribution multinomiale

# MvNorm
mvNorm.name = Distribution normale multivariée
mvNorm.desc = Une distribution normale multivariée
mvNorm.mu = Moyenne (vecteur colonne)
mvNorm.sigma = Matrice de covariance (symétrique définie positive)
mvNorm.sample = Retourne un vecteur aléatoire (<font face=\"Consolas\"><b>\u03BC</b></font> dans le cas de base) de la distribution normale multivariée. Vecteur colonne de nombres réels
mvNorm.pdf = Retourne la valeur de la FDP normale multivariée à <font face=\"Consolas\"><b>X</b></font> (vecteur colonne)

# NBin
nbin.name = Distribution binomiale négative
nbin.desc = Utilisée pour modéliser le nombre de succès qui se produisent parmi des essais répétés avant qu'un nombre spécifié d'échecs se produise
nbin.r = Nombre d'échecs jusqu'à l'arrêt des essais (Entier <font face=\"Consolas\">\u22650</font>)

# Norm
norm.name = Distribution normale
norm.desc = Distribution canonique en forme de cloche

# Pareto
pareto.name = Distribution de Pareto
pareto.desc = Une distribution de probabilité en loi de puissance
pareto.scale = Échelle (<font face=\"Consolas\">>0</font>) valeur minimale possible de <font face=\"Consolas\">x</font>
pareto.shape = Forme (<font face=\"Consolas\">>0</font>) indice de Pareto

# PERT
pert.name = Distribution PERT (Program Evaluation and Review Technique)
pert.desc = La méthode PERT convertit une distribution triangulaire en distribution en forme de bêta. Elle est souvent utilisée dans l'analyse des risques pour modéliser les estimations subjectives
pert.min = Valeur minimale, inclusive
pert.mode = Mode (valeur la plus probable)
pert.max = Valeur maximale, exclusive
pert.support = Nombre réel dans <font face=\"Consolas\">[a,c)</font>

# Pois
pois.name = Distribution de Poisson
pois.desc = Utilisée pour modéliser le nombre d'événements qui se produisent dans un intervalle fixe de temps/espace avec un taux moyen constant
pois.lambda = Nombre moyen d'événements dans l'intervalle (<font face=\"Consolas\">>0</font>)

# StudentT
student.mean_undefined = La moyenne est indéfinie pour <font face=\"Consolas\">\u03BD\u22641</font>
student.var_undefined = La variance est indéfinie pour <font face=\"Consolas\">\u03BD\u22641</font>
student.name = Distribution t de Student
student.desc = Une distribution en forme de cloche centrée à <font face=\"Consolas\">0</font>

# Tri
tri.name = Distribution triangulaire
tri.desc = Une distribution simple pour modéliser les valeurs minimales, les plus probables et maximales d'une variable aléatoire

# TruncNorm
truncNorm.name = Distribution normale tronquée
truncNorm.desc = Une distribution normale bornée par des valeurs min/max
truncNorm.support = Nombre réel dans <font face=\"Consolas\">[a,b]</font>

# Unif
unif.name = Distribution uniforme
unif.desc = Utilisée pour modéliser une distribution continue où toutes les valeurs sont équiprobables
unif.support = Nombre réel dans <font face=\"Consolas\">[a,b)</font>

# Weibull
weibull.name = Distribution de Weibull
weibull.desc = Souvent utilisée pour modéliser le temps jusqu'à la défaillance

# Zipf
zipf.name = Distribution de Zipf
zipf.desc = Utilisée pour modéliser les distributions discrètes en loi de puissance
zipf.s = Exposant (Nombre réel <font face=\"Consolas\">>0</font>)
zipf.n = Nombre d'éléments (Entier <font face=\"Consolas\">\u22651</font>)
zipf.support = Entier dans <font face=\"Consolas\">{1,2,...,n}</font>