# general
gen.sample = Amostra
gen.distribution_functions = Funções de distribuição
gen.moments = Momentos
gen.discrete = Discreto
gen.shape_gt0 = Forma (<font face=\"Consolas\">>0</font>)
gen.num_trials = Número de tentativas (Inteiro <font face=\"Consolas\">>0</font>)
gen.location = Localização
gen.scale_gt0 = Escala (<font face=\"Consolas\">>0</font>)
gen.degrees_freedom = Graus de liberdade (Inteiro <font face=\"Consolas\">>0</font>)
gen.pos_real_num = Número real positivo
gen.real_num_gt0 = Número real <font face=\"Consolas\">>0</font>
gen.max_value = Valor máximo
gen.min_value = Valor mínimo
gen.continuous = Contínuo
gen.multivariate = Multivariado

# descriptions
desc.sample = Retorna uma variável aleatória (média no caso base) da distribuição
desc.pmf = Retorna o valor da FMP em <font face=\"Consolas\">{0}</font>
desc.pdf = Retorna o valor da FDP em <font face=\"Consolas\">{0}</font>
desc.cdf = Retorna o valor da FDA em <font face=\"Consolas\">{0}</font>
desc.quantile = Retorna o quantil (FDA inversa) da distribuição em <font face=\"Consolas\">{0}</font>
desc.mean = Retorna a média da distribuição
desc.var = Retorna a variância da distribuição
desc.prob_success = Probabilidade de sucesso
desc.sample_rounded = Retorna uma variável aleatória (média arredondada no caso base) da distribuição
desc.sample_median = Retorna uma variável aleatória (mediana no caso base) da distribuição

# Bern
bern.name = Distribuição de Bernoulli
bern.desc = A distribuição de probabilidade de um único resultado de valor booleano
bern.support = Inteiro em <font face=\"Consolas\">{0,1}</font>

# Beta
beta.name = Distribuição Beta
beta.desc = Uma distribuição contínua limitada por <font face=\"Consolas\">0</font> e <font face=\"Consolas\">1</font>. Frequentemente usada para modelar probabilidades
beta.support = Número real em <font face=\"Consolas\">[0,1]</font>

# Bin
bin.name = Distribuição Binomial
bin.desc = Usada para modelar o número de sucessos que ocorrem em um número fixo de tentativas repetidas
bin.support = Inteiro em <font face=\"Consolas\">{0,1,...,n}</font>

# Cat
cat.name = Distribuição Categórica
cat.desc = Uma distribuição de probabilidade discreta de uma variável aleatória que pode assumir um de <font face=\"Consolas\">n</font> valores possíveis
cat.params = Vetor linha de tamanho <font face=\"Consolas\">n</font> contendo probabilidades de eventos (números reais em <font face=\"Consolas\">[0,1]</font>) que somam <font face=\"Consolas\">1.0</font>
cat.support = Inteiro em <font face=\"Consolas\">{0,1,...,n-1}</font>

# Cauchy
cauchy.name = Distribuição de Cauchy
cauchy.desc = Uma distribuição em forma de sino com caudas pesadas. <i>Nota</i>: Média e variância são indefinidas

# ChiSq
chiSq.name = Distribuição Qui-Quadrado
chiSq.desc = Distribuição da soma dos quadrados de <font face=\"Consolas\">k</font> variáveis normais padrão independentes

# Dir
dir.name = Distribuição de Dirichlet
dir.desc = Uma generalização multivariada da distribuição Beta
dir.params = Vetor linha de parâmetros de concentração (Números reais <font face=\"Consolas\">>0</font>)
dir.sample = Retorna um vetor aleatório (vetor linha de médias no caso base) da distribuição de Dirichlet
dir.mean = Retorna um vetor linha de médias da distribuição de Dirichlet
dir.var = Retorna a matriz de covariância da distribuição de Dirichlet
dir.pdf = Retorna o valor da FDP de Dirichlet em <font face=\"Consolas\"><b>x</b></font> onde <font face=\"Consolas\"><b>x</b></font> contém números reais em <font face=\"Consolas\">(0,1)</font> que somam <font face=\"Consolas\">1.0</font>

# DUnif
dunif.name = Distribuição Uniforme Discreta
dunif.desc = Usada para modelar uma distribuição discreta onde todos os valores são igualmente prováveis
dunif.min = Valor mínimo, inclusivo (inteiro)
dunif.max = Valor máximo, inclusivo (inteiro)
dunif.support = Inteiro em <font face=\"Consolas\">{a,a+1,...,b}</font>

# Expo
expo.name = Distribuição Exponencial
expo.desc = Usada para modelar o tempo entre eventos com uma taxa média constante
expo.param = Taxa média de eventos (<font face=\"Consolas\">>0</font>)

# Gamma
gamma.name = Distribuição Gama
gamma.desc = Uma distribuição contínua que produz números reais positivos

# Geom
geom.name = Distribuição Geométrica
geom.desc = Usada para modelar o número de sucessos que ocorrem antes da primeira falha
geom.support = Inteiro em <font face=\"Consolas\">{0,1,...}</font>

# Gumbel
gumbel.name = Distribuição de Gumbel
gumbel.desc = Usada para modelar a distribuição dos extremos (máx/mín) de um número de amostras de várias distribuições

# HalfCauchy
halfCauchy.name = Distribuição Meia-Cauchy
halfCauchy.desc = Meia-Cauchy positiva. <i>Nota</i>: Média e variância são indefinidas

# HalfNorm
halfNorm.name = Distribuição Meia-Normal
halfNorm.desc = Meia-Normal positiva
halfNorm.param = Desvio padrão <font face=\"Consolas\">>0</font>

# HGeom
hgeom.name = Distribuição Hipergeométrica
hgeom.desc = Usada para modelar o número de sucessos em um número fixo de sorteios sem reposição
hgeom.w = Número de sucessos possíveis (Inteiro <font face=\"Consolas\">>0</font>)
hgeom.b = Número de outros resultados possíveis (Inteiro <font face=\"Consolas\">>0</font>)
hgeom.n = Número de sorteios (Inteiro <font face=\"Consolas\">>0</font>)
hgeom.support = Inteiro em <font face=\"Consolas\">{0,1,...,<i>min</i>(w,n)}</font>

# Laplace
laplace.name = Distribuição de Laplace
laplace.desc = Uma distribuição contínua que pode ser pensada como duas distribuições Exponenciais colocadas em sentidos opostos

# Logistic
logistic.name = Distribuição Logística
logistic.desc = Uma distribuição contínua semelhante à distribuição Normal em forma, mas com caudas mais pesadas

# LogNorm
logNorm.name = Distribuição Log-Normal
logNorm.desc = Uma distribuição contínua de uma variável aleatória cujo logaritmo segue uma distribuição Normal

# Multi
multi.name = Distribuição Multinomial
multi.desc = Uma generalização da distribuição Binomial para múltiplas categorias
multi.p = Vetor linha contendo probabilidades de eventos (Números reais em <font face=\"Consolas\">[0,1]</font> que somam <font face=\"Consolas\">1.0</font>)
multi.sample = Retorna um vetor aleatório (vetor linha de médias no caso base) da distribuição Multinomial
multi.mean = Retorna um vetor linha de médias da distribuição Multinomial
multi.var = Retorna a matriz de covariância da distribuição Multinomial

# MvNorm
mvNorm.name = Distribuição Normal Multivariada
mvNorm.desc = Uma distribuição normal multivariada
mvNorm.mu = Média (vetor coluna)
mvNorm.sigma = Matriz de covariância (simétrica definida positiva)
mvNorm.sample = Retorna um vetor aleatório (<font face=\"Consolas\"><b>\u03BC</b></font> no caso base) da distribuição Normal Multivariada. Vetor coluna de números reais
mvNorm.pdf = Retorna o valor da FDP Normal Multivariada em <font face=\"Consolas\"><b>X</b></font> (vetor coluna)

# NBin
nbin.name = Distribuição Binomial Negativa
nbin.desc = Usada para modelar o número de sucessos que ocorrem em tentativas repetidas antes que um número especificado de falhas aconteça
nbin.r = Número de falhas até as tentativas serem interrompidas (Inteiro <font face=\"Consolas\">\u22650</font>)

# Norm
norm.name = Distribuição Normal
norm.desc = Distribuição canônica em forma de sino

# Pareto
pareto.name = Distribuição de Pareto
pareto.desc = Uma distribuição de probabilidade de lei de potência
pareto.scale = Escala (<font face=\"Consolas\">>0</font>) valor mínimo possível de <font face=\"Consolas\">x</font>
pareto.shape = Forma (<font face=\"Consolas\">>0</font>) índice de Pareto

# PERT
pert.name = Distribuição PERT (Program Evaluation and Review Technique)
pert.desc = O método PERT converte uma distribuição Triangular em uma distribuição em forma de Beta. É frequentemente usado em análise de risco para modelar estimativas subjetivas
pert.min = Valor mínimo, inclusivo
pert.mode = Moda (valor mais provável)
pert.max = Valor máximo, exclusivo
pert.support = Número real em <font face=\"Consolas\">[a,c)</font>

# Pois
pois.name = Distribuição de Poisson
pois.desc = Usada para modelar o número de eventos que ocorrem em um intervalo fixo de tempo/espaço com uma taxa média constante
pois.lambda = Número médio de eventos no intervalo (<font face=\"Consolas\">>0</font>)

# StudentT
student.mean_undefined = Média é indefinida para <font face=\"Consolas\">\u03BD\u22641</font>
student.var_undefined = Variância é indefinida para <font face=\"Consolas\">\u03BD\u22641</font>
student.name = Distribuição t de Student
student.desc = Uma distribuição em forma de sino centrada em <font face=\"Consolas\">0</font>

# Tri
tri.name = Distribuição Triangular
tri.desc = Uma distribuição simples para modelar os valores mínimo, mais provável e máximo de uma variável aleatória

# TruncNorm
truncNorm.name = Distribuição Normal Truncada
truncNorm.desc = Uma distribuição normal limitada por valores mínimo/máximo
truncNorm.support = Número real em <font face=\"Consolas\">[a,b]</font>

# Unif
unif.name = Distribuição Uniforme
unif.desc = Usada para modelar uma distribuição contínua onde todos os valores são igualmente prováveis
unif.support = Número real em <font face=\"Consolas\">[a,b)</font>

# Weibull
weibull.name = Distribuição de Weibull
weibull.desc = Frequentemente usada para modelar o tempo até falha

# Zipf
zipf.name = Distribuição de Zipf
zipf.desc = Usada para modelar distribuições de lei de potência discretas
zipf.s = Expoente (Número real <font face=\"Consolas\">>0</font>)
zipf.n = Número de elementos (Inteiro <font face=\"Consolas\">\u22651</font>)
zipf.support = Inteiro em <font face=\"Consolas\">{1,2,...,n}</font>